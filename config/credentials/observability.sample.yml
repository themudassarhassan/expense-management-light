# Observability snippet for Rails encrypted credentials
# -----------------------------------------------------------------------------
#   bin/rails credentials:edit
#
# Paste under the root credentials doc (alongside keys like `kamal:`).
#
# Grafana Cloud “Install Alloy” onboarding exports env vars matching these names:
#   GCLOUD_HOSTED_METRICS_URL       → prometheus_remote_write_url
#   GCLOUD_HOSTED_LOGS_URL          → loki_push_url
#   GCLOUD_HOSTED_METRICS_ID        → metrics_instance_id (not the same as logs ID!)
#   GCLOUD_HOSTED_LOGS_ID           → logs_instance_id
#   GCLOUD_RW_API_KEY               → api_key (one token with metrics:write + logs:write)
# -----------------------------------------------------------------------------
sentry:
  dsn:
  auth_token:
  org_slug:
  project_slug:

grafana_cloud:
  prometheus_remote_write_url:
  loki_push_url:
  metrics_instance_id:
  logs_instance_id:
  api_key:
